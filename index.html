<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="ToDoList.css">
</head>

<body>
    <div class="background">
        <div class="innerBox">
            <h2 class="heading"> To-Do-List</h2>
            <div class="textBoxStyle">
                <input class="textBox" type="text" id="input-box" placeholder="Add your text">
                <button class="buttonStyle" onclick="addTask()">Add</button>
            </div>
            <ul class="list" id="task-list">
                <!-- <li class="tick"> Task 1 </li>
                <li> Task 2 </li>
                <li> Task 3 </li> -->
            </ul>
        </div>
    </div>
</body>
<script src="ToDoList.js"></script>

</html>
